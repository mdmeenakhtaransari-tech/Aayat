<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffb3c6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating Hearts Canvas Background */
        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Card Design */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(255, 75, 110, 0.15);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 2;
            animation: fadeIn 1.5s ease-in-out;
        }

        .profile-title {
            color: #ff477e;
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #ff7096;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Interactive Buttons */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            position: relative;
            height: 50px;
        }

        .btn {
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .yes-btn {
            background-color: #ff477e;
            color: white;
        }

        .yes-btn:hover {
            background-color: #ff0a54;
            transform: scale(1.1);
        }

        .no-btn {
            background-color: #ffcad4;
            color: #ff477e;
            position: absolute;
        }

        /* Success Message styling */
        .success-message {
            display: none;
            color: #ff0a54;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <canvas id="heartCanvas"></canvas>

    <div class="card">
        <h1 class="profile-title">Hey Glossy Queen ✨</h1>
        <p class="subtitle">You make every single day brighter just by being in it.</p>
        
        <h2 style="color: #4a4a4a; font-size: 1.3rem;">Will you go on a date with me? 🌹</h2>
        
        <div class="btn-container" id="btnContainer">
            <button class="btn yes-btn" onclick="celebrate()">Yes!</button>
            <button class="btn no-btn" id="noBtn" style="left: 55%;">No</button>
        </div>

        <div class="success-message" id="successMsg">
            Yay! 🥰 I can't wait! ❤️ <br>
            (Check your DMs!)
        </div>
    </div>

    <script>
        // --- 1. Background Music Interaction Bypass ---
        function playMusic() {
            const music = document.getElementById('bg-music');
            if (music.paused) {
                music.play().catch(err => console.log("Audio waiting for explicit click."));
            }
        }
        // Triggers music on the first tap anywhere
        document.addEventListener('click', playMusic);
        document.addEventListener('touchstart', playMusic);


        // --- 2. Floating Hearts Animation ---
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 15 + 5;
                this.speed = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff7096';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                // Simple heart drawing formula
                ctx.bezierCurveTo(this.x - this.size/2, this.y - this.size/2, this.x - this.size, this.y + this.size/3, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x + this.size, this.y + this.size/3, this.x + this.size/2, this.y - this.size/2, this.x, this.y);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y -= this.speed;
                if (this.y < -this.size) {
                    this.y = canvas.height + Math.random() * 100;
                    this.x = Math.random() * canvas.width;
                }
            }
        }

        for(let i=0; i<30; i++) { hearts.push(new Heart()); }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(heart => { heart.update(); heart.draw(); });
            requestAnimationFrame(animate);
        }
        animate();


        // --- 3. Teleporting "No" Button ---
        const noBtn = document.getElementById('noBtn');
        
        function moveNoButton() {
            // Get safe dimensions inside the card container limits
            const maxX = 120; 
            const maxY = 100; 
            
            // Generate dynamic random directions
            const randomX = (Math.random() - 0.5) * maxX * 2;
            const randomY = (Math.random() - 0.5) * maxY * 2;
            
            // Teleport button using transform style
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }

        noBtn.addEventListener('mouseenter', moveNoButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents clicking mobile ghost elements
            moveNoButton();
        });


        // --- 4. Success Trigger ---
        function celebrate() {
            playMusic();
            document.getElementById('btnContainer').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
            
            // Turn up background heart storm!
            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    hearts.push(new Heart());
                }, i * 100);
            }
        }
    </script>
</body>
</html>
